workstreams:
  calibration:
    id: A
    status: complete_local
    completed:
      - Offline benchmark harness and versioned scenario library
      - Pairwise business-direction invariants
      - SERP classification and provider suitability benchmarks
      - Zero-network calibration CLI and CI coverage
    blockers:
      - Empirical calibration against real ranking, lead, and revenue outcomes

  public_data:
    id: B
    status: partial_local
    completed:
      - Service-specific addressable-market profiles
      - ACS, CBP, and NES acquisition and normalization adapters
      - Immutable dataset registry with validation, activation, and rollback
      - Zero-paid-call batch assessment service and standalone script
    blockers:
      - Register the specified rank-rent prefilter batch/top CLI commands
      - Activate reviewed production datasets and validate mappings with real samples

  production_data:
    id: C
    status: complete_local
    completed:
      - PostgreSQL production policy and local PostgreSQL composition
      - Separate API and worker sessions
      - Immutable filesystem and S3-compatible raw-response blob stores
      - Linear migrations and PostgreSQL concurrency test harness
    blockers:
      - Provision managed PostgreSQL and object storage
      - Run hosted concurrency, encrypted backup, restore, and blob-survival rehearsals

  worker_controls:
    id: D
    status: complete_local
    completed:
      - Separate durable worker with leases, heartbeats, retries, and quarantine
      - Exact planned-call consumption and transactional daily limits
      - Kill switches, circuit breakers, synthetic incidents, and billing reconciliation
      - Executable DataForSEO qualification matrix
    blockers:
      - Execute production DataForSEO qualification
      - Reconcile the first real provider billing export

  security:
    id: E
    status: partial_local
    completed:
      - Fail-closed OIDC verification and local test identities
      - Central roles and permissions for discovery and review routes
      - Append-only hash-linked audit records
      - Security headers, request limits, rate limiting, CORS, SSRF controls, and secret references
    blockers:
      - Add explicit centralized permissions for property mutations
      - Add append-only audit events for privileged property actions
      - Configure and validate a real OIDC tenant, Redis, and managed secret store
      - Rotate previously shared DataForSEO test credentials before production

  observability:
    id: F
    status: complete_local
    completed:
      - Correlated structured logs and trace context
      - Prometheus metrics, health endpoints, SLOs, alerts, dashboard, and runbooks
    blockers:
      - Provision production telemetry and alert destinations
      - Exercise staging alerts and incident response

  deployment:
    id: G
    status: complete_local
    completed:
      - Hardened containers and isolated environment validation
      - CI security, migration, replay, frontend, and container gates
      - Approval-gated release and rollback workflows
      - AWS Terraform reference infrastructure and immutable release manifests
    blockers:
      - Provision staging and production infrastructure
      - Rehearse deployment and rollback with protected environments

  opportunity_review:
    id: H
    status: complete_local
    completed:
      - Attributable review state machine and ownership
      - Reversible evidence overrides
      - Saved templates, aggregate-cost-bounded batches, and evidence exports
      - Approval completeness gate before property creation
    blockers:
      - Complete owner UAT with production-quality evidence

  property_workflow:
    id: I
    status: complete_local
    completed:
      - Versioned provider-independent properties and SiteConfig
      - One-active-provider enforcement and configuration-only replacement
      - Manual domain approval and verification workflow
      - Deterministic noindex staging builds, compliance gates, deployment records, and rollback
    blockers:
      - Resolve property-route RBAC and audit gaps from Workstream E
      - Select registrar, DNS, and public hosting providers
      - Release A approval is required before public deployment work

  lead_operations:
    id: J
    status: partial_local
    completed:
      - Durable, idempotent lead intake and delivery service layer
      - Provider assignment, call-route, privacy, consent, analytics, and retention models
      - Fixture delivery, call-tracking, spam, rate-limit, and alert adapters
    blockers:
      - Expose reviewed authenticated HTTP workflows
      - Select and implement production email, call-routing, and operator-alert adapters
      - Schedule retention and route-health jobs

  outcome_feedback:
    id: K
    status: partial_local
    completed:
      - Immutable decision-to-evidence lineage
      - Source-attributed outcome ingestion and descriptive calibration reports
      - Guardrails preventing automatic scoring changes
    blockers:
      - Select and implement production outcome-source adapters
      - Collect enough real outcomes for meaningful calibration

  qa:
    id: L
    status: partial
    completed:
      - Local backend, frontend, calibration, migration, and container verification
      - CI definitions for PostgreSQL, dependency, secret, image, and Terraform checks
    blockers:
      - Run staging load, failure-injection, security, recovery, and rollback exercises
      - Complete owner UAT and sign the release checklist

