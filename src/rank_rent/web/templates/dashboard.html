<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="/static/app.css">
  <title>Digital Real Estate Engine</title>
</head>
<body>
  <main>
    <h1>Opportunity Dashboard</h1>
    <form hx-post="/scan" hx-target="#scan-result">
      <label>Service <input name="service_text" value="water heater repair"></label>
      <label>Location <input name="location_text" value="Stamford, CT"></label>
      <label>Country <input name="country" value="US"></label>
      <label><input type="checkbox" name="dry_run" value="true"> Dry run</label>
      <button>Run Scan</button>
    </form>
    <div id="scan-result"></div>
    <table>
      <thead>
        <tr><th>Service</th><th>Market</th><th>Score</th><th>Confidence</th><th>Status</th><th>Last scanned</th></tr>
      </thead>
      <tbody>
        {% for item in opportunities %}
          <tr>
            <td><a href="/opportunities/{{ item.id }}">{{ item.service_family.display_name }}</a></td>
            <td>{{ item.market.display_name }}</td>
            <td>{{ item.latest_score or "n/a" }}</td>
            <td>{{ item.confidence or "n/a" }}</td>
            <td>{{ item.status }}</td>
            <td>{{ item.updated_at }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </main>
</body>
</html>
