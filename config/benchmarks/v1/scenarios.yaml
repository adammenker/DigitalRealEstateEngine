pairwise_expectations:
  - preferred: strong_demand_weak_competition
    over: strong_demand_strong_competition
    reason: Weaker competition must improve opportunity attractiveness.
    component: competitor_weakness
    minimum_margin: 1
  - preferred: weak_demand_weak_competition
    over: weak_demand_strong_competition
    reason: Competition direction must remain correct when demand is weak.
    component: competitor_weakness
    minimum_margin: 1
  - preferred: strong_demand_weak_competition
    over: weak_demand_weak_competition
    reason: Stronger demand must improve the demand component.
    component: demand_evidence
    minimum_margin: 1
  - preferred: measured_local_demand
    over: national_demand_only
    reason: Measured local demand must earn more demand credit than a population estimate.
    component: demand_evidence
    minimum_margin: 1
  - preferred: strong_demand_weak_competition
    over: too_few_providers
    reason: Healthy suitable-provider supply must improve provider suitability.
    component: provider_suitability
    minimum_margin: 1
  - preferred: strong_demand_weak_competition
    over: provider_oversupply
    reason: Healthy supply must outrank a demonstrably oversupplied market.
    component: provider_suitability
    minimum_margin: 0.5
  - preferred: strong_demand_weak_competition
    over: providers_outside_boundary
    reason: In-market providers must improve tenant suitability.
    component: provider_suitability
    minimum_margin: 1
  - preferred: strong_demand_weak_competition
    over: directory_dominated_top_results
    reason: Directory displacement must reduce organic click availability.
    component: organic_click_availability
    minimum_margin: 0.5
  - preferred: strong_demand_weak_competition
    over: marketplace_dominated_top_results
    reason: Marketplace displacement must reduce organic click availability.
    component: organic_click_availability
    minimum_margin: 0.25
  - preferred: strong_demand_weak_competition
    over: national_brand_dominated_results
    reason: National-brand and shopping displacement must reduce organic clicks.
    component: organic_click_availability
    minimum_margin: 0.5
  - preferred: strong_competitor_single_valuable_query
    over: same_competitor_several_valuable_queries
    reason: A domain dominating several valuable queries is a larger ranking obstacle.
    component: competitor_weakness
    minimum_margin: 0.25
  - preferred: strong_competitor_position_ten
    over: strong_competitor_position_one
    reason: A strong competitor at position ten is less threatening than at position one.
    component: competitor_weakness
    minimum_margin: 0.25
