    signals:
      owner_occupied_units: {<<: *owner_occupied_units, weight: 0.25}
      housing_age: {<<: *housing_age, weight: 0.25, strong_value: 50}
      housing_units: {<<: *housing_units, weight: 0.20}
      homeownership_rate: {<<: *homeownership_rate, weight: 0.15}
      combined_supply_density:
        <<: *combined_supply_density
        weight: 0.15
