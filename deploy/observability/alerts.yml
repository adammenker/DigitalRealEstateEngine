groups:
  - name: rank-rent-slos
    rules:
      - alert: RankRentApiUnavailable
        expr: sum(rate(rank_rent_api_requests_total{status=~"5.."}[5m])) / clamp_min(sum(rate(rank_rent_api_requests_total[5m])), 1) > 0.005
        for: 10m
        labels: { severity: page }
        annotations: { runbook: "docs/runbooks/database-outage.md" }
      - alert: RankRentWorkerUnavailable
        expr: rank_rent_worker_heartbeat_age_seconds > 60
        for: 5m
        labels: { severity: page }
        annotations: { runbook: "docs/runbooks/worker-stuck.md" }
      - alert: RankRentDatabaseUnavailable
        expr: rank_rent_database_available == 0
        for: 2m
        labels: { severity: page }
        annotations: { runbook: "docs/runbooks/database-outage.md" }
      - alert: RankRentQueueAgeHigh
        expr: rank_rent_scan_oldest_queued_age_seconds > 300
        for: 10m
        labels: { severity: ticket }
        annotations: { runbook: "docs/runbooks/worker-stuck.md" }
      - alert: RankRentRepeatedScanFailures
        expr: increase(rank_rent_discovery_scans_total{status="failed"}[15m]) >= 3
        labels: { severity: ticket }
        annotations: { runbook: "docs/runbooks/provider-outage.md" }
      - alert: RankRentCostLimitExceeded
        expr: increase(rank_rent_scan_cost_limit_blocks_total[10m]) > 0
        labels: { severity: ticket }
        annotations: { runbook: "docs/runbooks/dataforseo-overspend.md" }
      - alert: RankRentUnexpectedPaidCall
        expr: increase(rank_rent_unplanned_paid_calls_total[5m]) > 0
        labels: { severity: page }
        annotations: { runbook: "docs/runbooks/dataforseo-overspend.md" }
      - alert: RankRentAuthenticationAnomaly
        expr: increase(rank_rent_authentication_failures_total[10m]) > 25
        labels: { severity: ticket }
        annotations: { runbook: "docs/runbooks/credential-leak.md" }
      - alert: RankRentBackupFailure
        expr: time() - rank_rent_backup_last_success_timestamp_seconds > 86400
        labels: { severity: page }
        annotations: { runbook: "docs/runbooks/backup-restore.md" }
      - alert: RankRentRestoreCheckFailure
        expr: rank_rent_restore_check_success == 0
        labels: { severity: page }
        annotations: { runbook: "docs/runbooks/backup-restore.md" }
      - alert: RankRentDeploymentHealthFailure
        expr: rank_rent_deployment_ready == 0
        for: 5m
        labels: { severity: page }
        annotations: { runbook: "docs/runbooks/bad-public-deployment.md" }
      - alert: RankRentLeadRoutingFailure
        expr: increase(rank_rent_routing_failures_total[10m]) > 2
        labels: { severity: page }
        annotations: { runbook: "docs/runbooks/lead-routing-outage.md" }
