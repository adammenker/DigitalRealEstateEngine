name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DATA_MODE: fixture
      ALLOW_LIVE_API_CALLS: "false"
      DATABASE_URL: sqlite:////tmp/rank-rent-ci.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check src tests scripts
      - run: mypy --strict src
      - run: alembic upgrade head
      - run: rank-rent calibrate validate-config
      - run: rank-rent calibrate run --no-save
      - run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run lint
      - working-directory: frontend
        env:
          BACKEND_INTERNAL_URL: http://rank-rent:8000
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
